<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 232124.34 18000"
   width="232124.34"
   height="18000"
   version="1.1"
   id="svg35"
   sodipodi:docname="logo_full.svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview37"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     showgrid="false" />
  <defs
     id="defs13">
    <!-- Brand Gradients -->
    <linearGradient
       id="docGradient"
       x1="0"
       y1="1"
       x2="1"
       y2="0">
      <stop
         offset="0%"
         stop-color="#1E3A8A"
         id="stop2" />
      <!-- Deep Tech Blue -->
      <stop
         offset="100%"
         stop-color="#3B82F6"
         id="stop4" />
      <!-- Electric Blue -->
    </linearGradient>
    <linearGradient
       id="wrightGradient"
       x1="70"
       y1="25"
       x2="140"
       y2="95"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         stop-color="#00F2FE"
         id="stop7" />
      <!-- Bright Teal -->
      <stop
         offset="100%"
         stop-color="#4FACFE"
         id="stop9" />
      <!-- Cyan -->
    </linearGradient>
    <!-- Shadow for Depth -->
    <filter
       id="subtleShadow"
       x="0"
       y="0"
       width="1"
       height="1">
      <feDropShadow
         dx="2"
         dy="4"
         stdDeviation="4"
         flood-opacity="0.12" />
    </filter>
    <linearGradient
       inkscape:collect="always"
       xlink:href="#docGradient"
       id="linearGradient889"
       x1="72.183861"
       y1="23.852818"
       x2="175.80138"
       y2="-79.764694"
       gradientTransform="scale(1.7096343,0.58492043)"
       gradientUnits="userSpaceOnUse" />
    <linearGradient
       inkscape:collect="always"
       xlink:href="#docGradient"
       id="linearGradient891"
       x1="33.717091"
       y1="115.66835"
       x2="140.48787"
       y2="8.8975649"
       gradientTransform="scale(0.88975652,1.123903)"
       gradientUnits="userSpaceOnUse" />
  </defs>
  <!-- LOGO ICON (Document Silhouette + Integrated Checkmark) -->
  <!-- TYPOGRAPHY (DocWright) -->
  <g
     transform="translate(-28415,-3662)"
     id="g31">
    <!-- "Doc" - Heavy, Authoritative Navy -->
    <text
       font-family="system-ui, '-apple-system', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
       font-size="64px"
       font-weight="800"
       fill="#0f172a"
       letter-spacing="-1.5"
       id="text27">Doc</text>
    <!-- "Wright" - Vibrant, Dynamic Tech Gradient -->
    <text
       x="122"
       font-family="system-ui, '-apple-system', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
       font-size="64px"
       font-weight="400"
       fill="url(#docGradient)"
       letter-spacing="-0.5"
       id="text29"
       style="fill:url(#linearGradient889)">Wright</text>
  </g>
  <!-- Tagline -->
  <text
     x="-28412"
     y="-3634"
     font-family="system-ui, '-apple-system', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
     font-size="13px"
     font-weight="600"
     fill="#64748b"
     letter-spacing="5"
     id="text33">DOCUMENTATION DONE RIGHT</text>
  <g
     transform="translate(-28575,-3735)"
     filter="url(#subtleShadow)"
     id="g25">
    <!-- Main Document Body -->
    <path
       d="m 30,10 h 65 l 30,30 v 80 a 10,10 0 0 1 -10,10 H 40 A 10,10 0 0 1 30,120 Z"
       fill="url(#docGradient)"
       id="path15"
       style="fill:url(#linearGradient891)" />
    <!-- Document Lines (Abstract Tech/Text details) -->
    <rect
       x="50"
       y="35"
       width="35"
       height="6"
       rx="3"
       fill="#ffffff"
       opacity="0.3"
       id="rect17" />
    <rect
       x="50"
       y="55"
       width="55"
       height="6"
       rx="3"
       fill="#ffffff"
       opacity="0.3"
       id="rect19" />
    <rect
       x="50"
       y="75"
       width="40"
       height="6"
       rx="3"
       fill="#ffffff"
       opacity="0.3"
       id="rect21" />
    <!-- The "Wright" Checkmark (Slashes across the right edge) -->
    <path
       d="M 70,75 90,95 140,40 125,25 90,65 82,57 Z"
       fill="url(#wrightGradient)"
       id="path23"
       style="fill:url(#wrightGradient)" />
  </g>
</svg>
