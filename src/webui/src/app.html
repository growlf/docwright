<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocWright</title>
    <!-- Favicon uses the brand logo — updates automatically with brand/logo.svg -->
    <link rel="icon" type="image/svg+xml" href="/api/brand/logo" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { height: 100%; }
      body { margin: 0; padding: 0; background: var(--bg, #111); color: var(--fg, #ddd); height: 100%; display: flex; flex-direction: column; }

      /* Scrollbars — use CSS variables so they theme with light/dark */
      ::-webkit-scrollbar              { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track        { background: var(--bg,    #111); }
      ::-webkit-scrollbar-thumb        { background: var(--bg-3,  #2a2a2a); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover  { background: var(--muted, #666); }
      ::-webkit-scrollbar-corner       { background: var(--bg,    #111); }

      /* Firefox */
      * { scrollbar-width: thin; scrollbar-color: var(--bg-3, #2a2a2a) var(--bg, #111); }
    </style>
    %sveltekit.head%
    <!-- Theme override — place brand/theme.css in vault root to customise -->
    <link rel="stylesheet" href="/api/brand/theme" />
  </head>
  <body data-sveltekit-prerender="true">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
