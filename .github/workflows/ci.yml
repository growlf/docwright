name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install mcp

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test dispatch module (outside extension host)
        run: npm run test:dispatch
      # If test:dispatch fails because of a vscode import in src/dispatch/,
      # that is correct behaviour — fix the import, not the test.

      - name: Test lifecycle-gate pending-step detection
        run: npm run test:hooks:pending

      - name: Test claude-lifecycle-hook PreToolUse gate
        run: npm run test:hooks

      - name: Test MCP plan mutation tools
        run: python3 test/mcp/test-plan-tools.py
