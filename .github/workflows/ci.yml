name: CI

# Trigger policy (per policies/core/versioning.md):
#   - v0.*.* tags only — MAJOR stays 0 until a milestone proposal is approved.
#   - workflow_dispatch — manual trigger for CI testing without a release tag.
#
# When a major milestone (e.g. v1.0.0 / alpha launch) is approved through the
# governance process, update the tag pattern here as part of that release plan.
# Do not change this trigger ad-hoc — it is policy-gated.

on:
  push:
    tags:
      - 'v0.*.*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Version consistency gate
        run: |
          V=$(cat VERSION)
          P=$(node -e "console.log(require('./package.json').version)")
          W=$(node -e "console.log(require('./src/webui/package.json').version)")
          if [ "$V" != "$P" ]; then
            echo "::error::Version drift: VERSION=$V != package.json=$P"
            exit 1
          fi
          if [ "$V" != "$W" ]; then
            echo "::error::Version drift: VERSION=$V != src/webui/package.json=$W"
            exit 1
          fi
          echo "VERSION, package.json, and src/webui/package.json agree: v$V"

      - name: Install Node dependencies
        run: npm ci

      - name: Install webui dependencies (webui unit + round-trip tests)
        run: npm ci --prefix src/webui

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test dispatch module (outside extension host)
        run: npm run test:dispatch

      - name: Test lifecycle-gate pending-step detection
        run: npm run test:hooks:pending

      - name: Test claude-lifecycle-hook PreToolUse gate
        run: npm run test:hooks

      - name: Test MCP tools (TypeScript)
        run: npm run test:mcp

      - name: Test cross-tool compatibility (skills table, agent roles, spec docs)
        run: npm run test:compat

      - name: Test cross-surface integration (gate parity, auto-commit, save gating)
        run: npm run test:integration

      - name: Test webui units (auth, editors, round-trip, git commit)
        run: npm run test:webui

      # Roadmap date discipline (roadmap-date-discipline plan, step 6) — STRICT/hard-fail:
      # a dateless active milestone or an out-of-range issue fails the build. The board is
      # fully dated (v0.6.0=2026-07-31, v0.7.0=2026-09-15) so this is now enforcing.
      # Fail-safe: if the GH secrets are absent, or GitHub is unreachable, the check degrades
      # to a clean pass (a fetch failure is not a roadmap violation) — so it never false-fails
      # an unrelated PR. It only blocks on an actual data violation.
      # Escape hatches (see policies/core/roadmap-date-discipline.md): move genuinely
      # unscheduled work to the exempt backlog/future buckets, or fix the milestone/issue
      # dates. A true emergency bypass is a git-visible one-line revert of --strict here.
      - name: Roadmap date discipline (strict — blocks on dateless/out-of-range)
        run: npm run roadmap:check -- --strict
        env:
          DOCWRIGHT_GH_REPO: growlf/docwright
          DOCWRIGHT_GH_TOKEN: ${{ secrets.DOCWRIGHT_GH_TOKEN }}
          DOCWRIGHT_GH_PROJECT_ID: ${{ secrets.DOCWRIGHT_GH_PROJECT_ID }}

  branch-policy:
    name: Branch policy check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: PRs to main (the trunk) must use a typed prefix
        if: github.base_ref == 'main'
        run: |
          src="${{ github.head_ref }}"
          if [[ ! "$src" =~ ^(feat|fix|chore|docs|refactor|test|policy|decision|dependabot|release|hotfix)/.+ ]]; then
            echo "::error::PRs to main must use a typed prefix (feat/, fix/, chore/, docs/, refactor/, test/, policy/, decision/, dependabot/, release/, hotfix/) — got: $src"
            exit 1
          fi

      - name: No dangling merged branches (auto-delete must be working)
        env:
          GH_TOKEN: ${{ github.token }}
        # Checks the OUTCOME, not the repo setting — the default GITHUB_TOKEN
        # cannot read delete_branch_on_merge (admin-only field, reads as null).
        # A merged PR's head branch surviving >1h means auto-delete is off or
        # was bypassed; the 1h grace covers deliberate branch restores.
        run: |
          dangling=""
          while IFS=$'\t' read -r ref merged; do
            [ -z "$ref" ] && continue
            case "$ref" in release/*|dogfood) continue;; esac
            [ "$(date -d "$merged" +%s)" -gt "$(( $(date +%s) - 3600 ))" ] && continue
            enc=$(printf '%s' "$ref" | sed 's|/|%2F|g')
            if gh api "repos/${GITHUB_REPOSITORY}/branches/${enc}" --silent 2>/dev/null; then
              dangling="$dangling $ref"
            fi
          done < <(gh pr list --repo "${GITHUB_REPOSITORY}" --state merged --base main --limit 10 --json headRefName,mergedAt --jq '.[] | "\(.headRefName)\t\(.mergedAt)"')
          if [ -n "$dangling" ]; then
            echo "::error::Dangling merged branch(es):${dangling} — enable 'Automatically delete head branches' in repo settings, then: git push origin --delete${dangling}"
            exit 1
          fi

  docker:
    name: Docker build + health check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t docwright:ci .

      - name: Start container (example-vault as vault)
        run: |
          docker run -d --name dw-ci \
            -e GIT_USER_NAME="CI Bot" \
            -e GIT_USER_EMAIL="ci@docwright" \
            -v "${{ github.workspace }}/example-vault":/vault \
            -p 5173:5173 \
            docwright:ci

      - name: Wait for health
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5173/api/health | grep -q '"ok":true'; then
              echo "healthy"; exit 0
            fi
            echo "attempt $i — waiting..."; sleep 3
          done
          echo "health check timed out"; docker logs dw-ci; exit 1

      - name: Stop container
        if: always()
        run: docker rm -f dw-ci || true

      - name: Log in to ghcr.io (tagged releases only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to ghcr.io (tagged releases only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }},ghcr.io/${{ github.repository }}:latest
