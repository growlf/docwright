# DocWright — DEVELOPMENT compose (live source, Vite HMR)
#
# This file is for LOCAL DEVELOPMENT / dogfooding a branch: it builds the image,
# bind-mounts the project source, and runs the Vite dev server (DOCWRIGHT_DEV_SERVER=1)
# so code edits are picked up live without a rebuild.
#
# ▶ For PRODUCTION deployment use docker-compose.prod.yml instead (published
#   image, config via app.env, single vault mount, no source tree). See its header
#   and app.env.example for the environment contract.
#
# Env (.env in this dir): VAULT_PATH, PORT, DOCKER_GATEWAY_IP. Auth in dev is read
# by Vite from src/webui/.env (production reads app.env instead).

services:
  docwright:
    build: .
    # DEV: run the Vite dev server over the mounted source (live reload).
    environment:
      DOCWRIGHT_DEV_SERVER: "1"
      GIT_USER_NAME:  ${GIT_USER_NAME:-DocWright User}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-docwright@localhost}
      GIT_TOKEN:      ${GIT_TOKEN:-}
      # OpenCode URL — set DOCKER_GATEWAY_IP in .env to the IP where OpenCode is
      # reachable from the container.
      OPENCODE_URL:    http://${DOCKER_GATEWAY_IP}:4096
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-}
      # GH-pivot: dev-issue source (local by default; `github` reads GitHub Issues +
      # the Project board). Values live in .env (gitignored — keeps the token off git).
      ISSUES_SOURCE:           ${ISSUES_SOURCE:-local}
      DOCWRIGHT_GH_REPO:       ${DOCWRIGHT_GH_REPO:-}
      DOCWRIGHT_GH_TOKEN:      ${DOCWRIGHT_GH_TOKEN:-}
      DOCWRIGHT_GH_PROJECT_ID: ${DOCWRIGHT_GH_PROJECT_ID:-}
    volumes:
      # Project source — live-dev mount (Vite HMR). Removed in the prod compose.
      - .:/app
      - ${VAULT_PATH:-./example-vault}:/vault
    ports:
      - "${PORT:-5173}:5173"
      # Uncomment to expose the MCP SSE port for external tooling:
      # - "3002:3002"
    restart: unless-stopped
