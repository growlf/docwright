# DocWright — docker compose scenarios
#
# Three scenarios are provided. Uncomment the one that fits your deployment.
# Only ONE scenario should be active at a time.
#
# Required for all scenarios:
#   GIT_USER_NAME   — name used for git commits from the web UI
#   GIT_USER_EMAIL  — email used for git commits from the web UI
#
# Optional:
#   GIT_TOKEN       — GitHub/Forgejo personal access token for HTTPS push
#                     (alternative: mount SSH key — see docs/docker.md)

# ── Scenario 1: Standalone (local developer / dogfood development) ──────────
# Mount local vault directory AND entire project source for live development.
# Access the UI at http://localhost:5173 (or configured PORT).
# Suitable for a single developer or dogfooding a branch.
#
# For dogfood development: mount entire project folder to get live changes
# without rebuilding. This runs the exact same environment as production.

services:
  docwright:
    build: .
    volumes:
      # Project source — mounts entire folder for live development
      # (Comment out the next line to use the built image instead)
      - .:/app
      # Vault data directory
      - ${VAULT_PATH:-./example-vault}:/vault
    ports:
      - "${PORT:-5173}:5173"
      # Uncomment to expose MCP SSE for external tooling:
      # - "3002:3002"
    environment:
      GIT_USER_NAME:   ${GIT_USER_NAME:-DocWright User}
      GIT_USER_EMAIL:  ${GIT_USER_EMAIL:-docwright@localhost}
      GIT_TOKEN:       ${GIT_TOKEN:-}
      # OpenCode URL — set DOCKER_GATEWAY_IP in .env to IP where OpenCode is reachable from container
      OPENCODE_URL:    http://${DOCKER_GATEWAY_IP}:4096
      # OpenCode basic auth — must match the values the `opencode serve` process
      # was started with (scripts/DocWright sources src/webui/.env for those).
      # Set in repo-root .env; never commit values.
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-}
    restart: unless-stopped

